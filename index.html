<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Sabrine</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #ffccd5, #ffb3c1, #fb6f92);
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            width: 100%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Falling Petals */
        .petal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 150% 0 150% 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: #fff;
            margin: 0 0 15px 0;
            z-index: 10;
            text-shadow: 2px 4px 10px rgba(251, 111, 146, 0.4);
            text-align: center;
        }

        /* Polaroid Frame Responsive */
        .frame {
            background: white;
            padding: 10px 10px 45px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: rotate(-1.5deg);
            cursor: pointer;
            transition: all 0.4s ease;
            z-index: 5;
            width: 85%;
            max-width: 280px;
            margin: 0 auto;
        }

        .frame:active {
            transform: scale(0.95);
        }

        .frame img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
        }

        .message-container {
            z-index: 10;
            text-align: center;
            padding: 0 15px;
            width: 100%;
        }

        #special-message {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.8rem, 8vw, 3rem);
            color: #fff;
            margin-top: 25px;
            opacity: 0;
            transition: all 1.2s ease;
            transform: translateY(20px);
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
            line-height: 1.2;
        }

        #apology-message {
            font-size: clamp(0.85rem, 4vw, 1.1rem);
            margin-top: 15px;
            opacity: 0;
            transition: all 1.8s ease 0.8s;
            font-style: italic;
            color: #fff;
            font-weight: 300;
            padding: 0 10px;
        }

        .instruction {
            color: #fb6f92;
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
            text-align: center;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 100;
            animation: heartFloat 2s forwards;
        }

        @keyframes heartFloat {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="petal-container" id="petal-box"></div>

    <h1>For Sabrine...</h1>

    <div class="frame" onclick="showLove(event)">
        <img src="Rose.png" alt="A rose for Sabrine">
        <div class="instruction">Tap with love</div>
    </div>

    <div class="message-container">
        <div id="special-message">
            "I love you to death, Sabrine. <br>In a world of temporary things, you are my forever." ❤️
        </div>
        <div id="apology-message">
            I've never given you proper flowers but I could at least do this for you <br>
            I apologize if I ever hurt you... <br>
            Thank you for everything you've done for me.
        </div>
    </div>

    <script>
        function showLove(e) {
            document.getElementById('special-message').style.opacity = '1';
            document.getElementById('special-message').style.transform = 'translateY(0)';
            document.getElementById('apology-message').style.opacity = '1';
            
            // Get coordinates for both mouse and touch
            const charX = e.clientX || (e.touches && e.touches[0].clientX);
            const charY = e.clientY || (e.touches && e.touches[0].clientY);

            for(let i=0; i<10; i++) {
                setTimeout(() => createHeart(charX, charY), i * 50);
            }
            
            for(let i=0; i<20; i++) {
                setTimeout(() => createPetal(true), i * 30);
            }
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = (x - 10 + (Math.random() * 40 - 20)) + 'px';
            heart.style.top = (y - 10 + (Math.random() * 40 - 20)) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        const container = document.getElementById('petal-box');
        
        function createPetal(burst) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            const size = Math.random() * 10 + 6 + 'px';
            const colors = ['#ffffff', '#ffe5ec', '#ffc2d1', '#ffb3c1'];
            
            petal.style.width = size;
            petal.style.height = size;
            petal.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            if (burst) {
                petal.style.top = '40vh';
                petal.style.left = '50vw';
            } else {
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-10vh';
            }

            petal.style.animationDuration = Math.random() * 3 + 3 + 's';
            petal.style.opacity = Math.random() * 0.6 + 0.3;
            
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }

        // High density falling petals
        setInterval(() => createPetal(false), 250); 
    </script>

</body>
</html>
