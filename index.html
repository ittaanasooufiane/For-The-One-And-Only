<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sabrine</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            /* Lighter, soft romantic pink gradient */
            background: radial-gradient(circle at center, #ffccd5, #ffb3c1, #fb6f92);
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Falling Petals */
        .petal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 150% 0 150% 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            50% { transform: translateY(50vh) rotate(180deg) translateX(20px); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: #fff;
            margin-bottom: 10px;
            z-index: 10;
            text-shadow: 2px 4px 10px rgba(251, 111, 146, 0.4);
        }

        /* Polaroid Frame */
        .frame {
            background: white;
            padding: 12px 12px 50px 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: rotate(-1.5deg);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            max-width: 280px;
            border: none;
        }

        .frame:hover {
            transform: rotate(0deg) scale(1.05);
            box-shadow: 0 30px 60px rgba(251, 111, 146, 0.3);
        }

        .frame img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
        }

        .message-container {
            z-index: 10;
            text-align: center;
            padding: 0 20px;
            max-width: 700px;
        }

        #special-message {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #fff;
            margin-top: 30px;
            opacity: 0;
            transition: all 1.2s ease;
            transform: translateY(20px);
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
            line-height: 1.2;
        }

        #apology-message {
            font-size: 1rem;
            margin-top: 15px;
            opacity: 0;
            transition: all 1.8s ease 0.8s;
            font-style: italic;
            color: #fff;
            font-weight: 300;
        }

        .instruction {
            color: #fb6f92;
            font-size: 0.65rem;
            letter-spacing: 2px;
            margin-top: 12px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 2rem;
            pointer-events: none;
            z-index: 100;
            animation: heartFloat 2s forwards;
        }

        @keyframes heartFloat {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="petal-container" id="petal-box"></div>

    <h1>For Sabrine...</h1>

    <div class="frame" onclick="showLove(event)">
        <img src="Rose.png" alt="A rose for Sabrine">
        <div class="instruction">Tap with love</div>
    </div>

    <div class="message-container">
        <div id="special-message">
            "I love you to death, Sabrine. <br>In a world of temporary things, you are my forever." ❤️
        </div>
        <div id="apology-message">
            I apologize if I ever hurt you... <br>
            Thank you for everything you've done for me.
        </div>
    </div>

    <script>
        function showLove(e) {
            document.getElementById('special-message').style.opacity = '1';
            document.getElementById('special-message').style.transform = 'translateY(0)';
            document.getElementById('apology-message').style.opacity = '1';
            
            for(let i=0; i<15; i++) {
                setTimeout(() => createHeart(e.clientX, e.clientY), i * 50);
            }
            
            // Large burst of petals on click
            for(let i=0; i<30; i++) {
                setTimeout(() => createPetal(true), i * 30);
            }
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = (x - 20 + (Math.random() * 60 - 30)) + 'px';
            heart.style.top = (y - 20 + (Math.random() * 60 - 30)) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        const container = document.getElementById('petal-box');
        
        function createPetal(burst) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // Randomized size and color for realism
            const size = Math.random() * 12 + 8 + 'px';
            const colors = ['#ffffff', '#ffe5ec', '#ffc2d1', '#ffb3c1'];
            
            petal.style.width = size;
            petal.style.height = size;
            petal.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            if (burst) {
                petal.style.top = '50vh';
                petal.style.left = '50vw';
                petal.style.transition = "all 2s ease-out";
            } else {
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-10vh';
            }

            petal.style.animationDuration = Math.random() * 3 + 4 + 's';
            petal.style.opacity = Math.random() * 0.5 + 0.3;
            
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }

        // Increased frequency of falling petals (Higher density)
        setInterval(() => createPetal(false), 200); 
    </script>

</body>
</html>
